name: Daily China Tech Overseas News Scan

on:
  # 外部 cron 服务通过 repository_dispatch 触发（GitHub schedule 有 bug 不触发）
  repository_dispatch:
    types: [daily-scan]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEP_MODE: ${{ github.event.client_payload.deep_mode || github.event.inputs.deep_mode || 'true' }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/daily_scan.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-china-tech-report
          path: output/report.md
          retention-days: 30
